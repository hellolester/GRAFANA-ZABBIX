###############################################################################
# zabbix_server.conf
# Minimal Zabbix Server 7.0 configuration for open-monitoring-stack-grafana-zabbix
# Placeholders like {{DB_HOST}} are substituted by scripts/install_zabbix.sh
###############################################################################

ListenPort=10051
SourceIP=

LogFile=/var/log/zabbix/zabbix_server.log
LogFileSize=10
DebugLevel=3

PidFile=/run/zabbix/zabbix_server.pid
SocketDir=/run/zabbix

DBHost={{DB_HOST}}
DBName={{DB_NAME}}
DBUser={{DB_USER}}
DBPassword={{DB_PASSWORD}}
DBPort={{DB_PORT}}

# Networking / device discovery friendly defaults
StartPollers=10
StartPollersUnreachable=5
StartTrappers=5
StartPingers=5
StartDiscoverers=5

# SNMP
StartSNMPTrapper=1
SNMPTrapperFile=/var/log/snmptrap/snmptrap.log

# Housekeeping / performance
HousekeepingFrequency=1
CacheSize=32M
HistoryCacheSize=16M
TrendCacheSize=8M
ValueCacheSize=16M

Timeout=4
TrapperTimeout=300
UnreachablePeriod=45
UnavailableDelay=60
UnreachableDelay=15

# Alerting scripts / media
AlertScriptsPath=/usr/lib/zabbix/alertscripts
ExternalScripts=/usr/lib/zabbix/externalscripts

LogSlowQueries=3000

StatsAllowedIP=127.0.0.1
