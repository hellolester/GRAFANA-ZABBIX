###############################################################################
# grafana.ini
# Minimal, secure Grafana configuration for open-monitoring-stack-grafana-zabbix.
# Placeholders like {{GRAFANA_PORT}} are substituted by scripts/install_grafana.sh
###############################################################################

[server]
protocol = http
http_addr =
http_port = {{GRAFANA_PORT}}
domain = {{MONITORING_HOSTNAME}}
root_url = %(protocol)s://%(domain)s:%(http_port)s/
enable_gzip = true

[security]
# Change the admin password immediately after first login.
admin_user = admin
cookie_secure = false
disable_gravatar = true
strict_transport_security = false
x_content_type_options = true
x_xss_protection = true

[users]
allow_sign_up = false
allow_org_create = false
auto_assign_org = true
auto_assign_org_role = Viewer

[auth.anonymous]
enabled = false

[analytics]
reporting_enabled = false
check_for_updates = false

[log]
mode = console file
level = info

[plugins]
allow_loading_unsigned_plugins = alexanderzobnin-zabbix-app,alexanderzobnin-zabbix-datasource,alexanderzobnin-zabbix-triggers-panel

[dashboards]
default_home_dashboard_path =

[snapshots]
external_enabled = false

[alerting]
enabled = true

[unified_alerting]
enabled = true
