###############################################################################
# nginx.conf (site config)
# Serves the Zabbix PHP frontend and reverse-proxies to Grafana is optional
# (Grafana is exposed directly on GRAFANA_PORT by default).
# Placeholders are substituted by scripts/configure_services.sh
###############################################################################

server {
    listen {{WEB_LISTEN_PORT}};
    listen [::]:{{WEB_LISTEN_PORT}};
    server_name {{MONITORING_HOSTNAME}};

    root /usr/share/zabbix;
    index index.php;

    access_log /var/log/nginx/zabbix.access.log;
    error_log  /var/log/nginx/zabbix.error.log;

    client_max_body_size 16M;

    location {{ZABBIX_URL_PATH}} {
        alias /usr/share/zabbix;
        index index.php;

        location ~ {{ZABBIX_URL_PATH}}/.+\.php$ {
            alias /usr/share/zabbix;
            fastcgi_pass unix:{{PHP_FPM_SOCK}};
            fastcgi_index index.php;
            fastcgi_param SCRIPT_FILENAME $request_filename;
            include fastcgi_params;
            fastcgi_param PATH_INFO $fastcgi_path_info;
        }

        location ~ {{ZABBIX_URL_PATH}}/.+\.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2)$ {
            alias /usr/share/zabbix;
        }
    }

    location / {
        return 301 {{ZABBIX_URL_PATH}};
    }

    # Basic hardening
    server_tokens off;
    location ~ /\.ht {
        deny all;
    }
}
